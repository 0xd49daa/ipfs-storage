name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
      - name: Type check
        run: deno task typecheck
      - name: Test
        run: deno task test
      - name: Publish package
        run: deno publish
